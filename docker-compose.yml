services:
  postgres:
    image: postgres:15-alpine
    container_name: medusa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-docker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - medusa

  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - medusa

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: medusa-backend:dev
    container_name: medusa-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/medusa-docker
      REDIS_URL: redis://redis:6379
      # CORS values live in backend/.env(.prod) so they can differ between
      # dev and prod without a compose edit. Defaults are in
      # backend/.env.template.
      #
      # SEED_ON_START is read from backend/.env via env_file (default true).
      # It is deliberately NOT listed here: putting
      #   SEED_ON_START: ${SEED_ON_START:-true}
      # here would cause Compose to recreate this container (with the default
      # "true") on any invocation that doesn't set the variable inline,
      # silently re-running the seed. See backend/.env.template.
    networks:
      - medusa

  storefront:
    profiles:
      - storefront
    build:
      context: ./storefront
      dockerfile: Dockerfile
    image: medusa-storefront:dev
    container_name: medusa-storefront
    depends_on:
      - backend
    env_file:
      - ./storefront/.env
    environment:
      NODE_ENV: development
    networks:
      - medusa

volumes:
  postgres_data:

networks:
  medusa:
    driver: bridge
